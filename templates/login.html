{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card">
            <div class="card-body p-5">
                <h3 class="text-center mb-4">Login to SmartVolunteers</h3>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" name="email" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Login</button>
                </form>
                <hr>
                <p class="text-center mb-0">New volunteer? <a href="{{ url_for('volunteer_signup') }}">Sign up here</a></p>
                <small class="d-block text-center text-muted mt-3">Admin: admin@admin.com / admin123</small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
