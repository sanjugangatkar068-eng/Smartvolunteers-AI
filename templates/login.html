<!DOCTYPE html>
<html>
<head>
    <title>SmartVolunteers - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="flex min-h-screen items-center justify-center">
        <div class="w-full max-w-md bg-white rounded-lg shadow-md p-8">
            <div class="text-center mb-6">
                <div class="mx-auto h-16 w-16 bg-blue-600 rounded-full flex items-center justify-center">
                    <span class="text-white text-2xl font-bold">SV</span>
                </div>
                <h2 class="mt-4 text-2xl font-bold text-gray-900">SmartVolunteers</h2>
                <p class="text-gray-600">AI-Powered Volunteer Matching</p>
            </div>
            {% if error %}
            <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">{{ error }}</div>
            {% endif %}
            <form method="POST" action="/login">
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Email</label>
                    <input name="email" type="email" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="admin or volunteer email">
                </div>
                <div class="mb-6">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Password</label>
                    <input name="password" type="password" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Enter password">
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-blue-700">Login</button>
            </form>
            <div class="mt-6 text-center">
                <p class="text-sm text-gray-600">New volunteer?</p>
                <a href="/volunteer_signup" class="text-blue-600 hover:text-blue-800 font-medium">Sign up as a Volunteer →</a>
            </div>
            <div class="mt-4 text-center text-xs text-gray-500">Admin: admin / admin123</div>
        </div>
    </div>
</body>
</html>
